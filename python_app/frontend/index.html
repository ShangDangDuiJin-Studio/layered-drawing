<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>不织布分层排版 · Python</title>
  <style>
    :root { --bg:#f0f2f5; --card:#fff; --accent:#2563eb; --accent2:#059669; --text:#1e293b; --muted:#64748b; --border:#e2e8f0; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1200px; margin:0 auto; padding:1rem; }
    h1 { font-size:1.35rem; margin:0 0 .2rem; }
    .sub { color:var(--muted); font-size:.88rem; margin-bottom:1rem; }
    .card { background:var(--card); border-radius:12px; padding:1rem; box-shadow:0 1px 3px rgba(0,0,0,.07); margin-bottom:1rem; }
    .card h2 { font-size:1rem; margin:0 0 .75rem; color:#334155; }
    .grid2 { display:grid; grid-template-columns:1fr 260px; gap:1rem; }
    .grid-layout { display:grid; grid-template-columns:1fr 260px; gap:1rem; }
    @media(max-width:800px){ .grid2,.grid-layout{ grid-template-columns:1fr; } }
    .canvas-box { background:#ddd; border-radius:8px; overflow:hidden; min-height:180px; }
    canvas { display:block; max-width:100%; cursor:crosshair; }
    #layoutCanvas { cursor:default; }
    label { font-size:.82rem; font-weight:600; display:block; margin:.5rem 0 .25rem; }
    input[type=range] { width:100%; }
    .range-val { float:right; font-weight:normal; color:var(--muted); }
    button { padding:.55rem .85rem; font-size:.88rem; font-weight:600; border:none; border-radius:7px; cursor:pointer; background:var(--accent); color:#fff; }
    button.green { background:var(--accent2); }
    button.secondary { background:#e2e8f0; color:var(--text); }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .btn-row { display:flex; flex-wrap:wrap; gap:.4rem; margin:.5rem 0; }
    .drop { border:2px dashed var(--border); border-radius:8px; padding:1.2rem; text-align:center; color:var(--muted); cursor:pointer; font-size:.9rem; }
    select[multiple] { width:100%; min-height:120px; font-size:.85rem; }
    #status { margin-top:.6rem; padding:.6rem; border-radius:6px; font-size:.85rem; display:none; }
    #status.show { display:block; }
    #status.ok { background:#ecfdf5; color:#065f46; }
    #status.err { background:#fef2f2; color:#991b1b; }
    #status.info { background:#eff6ff; color:#1e40af; }
    .hint { font-size:.78rem; color:var(--muted); margin:.35rem 0; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>不织布分层排版工具</h1>
  <p class="sub">Python 版 · 手动魔棒分层 + 自动换行排版 · PDF 部件外扩 3mm</p>

  <!-- 分层编辑 -->
  <div class="card">
    <h2>分层编辑</h2>
    <div class="grid2">
      <div>
        <div class="drop" id="dropZone">点击或拖拽导入图片</div>
        <input type="file" id="fileInput" accept="image/*" hidden />
        <div class="canvas-box" style="margin-top:.75rem"><canvas id="editCanvas"></canvas></div>
        <p class="hint">在左图点击 = 魔棒选区 → 点「生成图层」</p>
      </div>
      <div>
        <label>编辑区部件列表（可多选合并）</label>
        <select id="editLayerList" multiple size="7"></select>
        <div class="btn-row">
          <button id="btnMake">生成图层</button>
        </div>
        <label>选区高亮色</label>
        <input type="color" id="borderColor" value="#00ffff" title="魔棒选区轮廓颜色" style="width:100%;height:36px;padding:2px;border:1px solid var(--border);border-radius:6px;cursor:pointer" />
        <p class="hint">仅影响魔棒选区轮廓显示；部件蒙版边框在 PDF 中仍为黑色</p>
        <div class="btn-row">
          <button class="secondary" id="btnMerge">合并部件</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 排版输出 -->
  <div class="card">
    <h2>排版输出</h2>
    <div class="grid-layout">
      <div>
        <div class="canvas-box"><canvas id="layoutCanvas"></canvas></div>
        <p class="hint" id="layoutHint">点击「自动换行与排版」后在此显示预览</p>
      </div>
      <div>
        <button class="green" id="btnAutoLayout" style="width:100%">自动换行与排版</button>

        <label>动态缩放 <span class="range-val" id="scaleVal">100%</span></label>
        <input type="range" id="scaleSlider" min="30" max="200" value="100" />

        <label id="spacingLabel">动态间距 <span class="range-val" id="spacingVal">10 px</span></label>
        <input type="range" id="spacingSlider" min="0" max="120" value="10" />

        <label>排版部件列表（Ctrl/⌘+点击 多选相邻两项调间距）</label>
        <select id="layoutPartList" multiple size="6"></select>

        <button id="btnExportPdf" style="width:100%;margin-top:.6rem">1:1 矢量 PDF 导出</button>
      </div>
    </div>
  </div>

  <div id="status"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const editCanvas = $('editCanvas');
const editCtx = editCanvas.getContext('2d');
const layoutCanvas = $('layoutCanvas');
const layoutCtx = layoutCanvas.getContext('2d');
let editImg = new Image();
let wandContours = [];
let hasLaidOut = false;
let borderColorHex = '#00ffff';

function rgbToHex(rgb) {
  if (!rgb || rgb.length < 3) return borderColorHex;
  const h = n => Math.max(0, Math.min(255, Math.round(n * 255))).toString(16).padStart(2, '0');
  return '#' + h(rgb[0]) + h(rgb[1]) + h(rgb[2]);
}

async function syncBorderColorFromState(data) {
  if (data.border_color_hex) borderColorHex = data.border_color_hex;
  else if (data.border_color) borderColorHex = rgbToHex(data.border_color);
  $('borderColor').value = borderColorHex;
}

function setStatus(msg, kind='info') {
  const el = $('status');
  el.textContent = msg;
  el.className = 'show ' + kind;
}

function bindRange(sliderId, valId, fmt=v=>v, onChange) {
  const el = $(sliderId), val = $(valId);
  el.addEventListener('input', () => {
    val.textContent = fmt(el.value);
    if (onChange) onChange();
  });
}

function editSelected() {
  return Array.from($('editLayerList').selectedOptions).map(o => +o.value);
}

function layoutSelected() {
  return Array.from($('layoutPartList').selectedOptions).map(o => +o.value);
}

async function refreshEditLayers() {
  const res = await fetch('/api/state');
  const data = await res.json();
  const sel = $('editLayerList');
  sel.innerHTML = '';
  (data.layers || []).forEach(l => {
    const o = document.createElement('option');
    o.value = l.index;
    o.textContent = `${l.index + 1}. ${l.name}`;
    sel.appendChild(o);
  });
}

async function refreshLayoutParts() {
  const res = await fetch('/api/state');
  const data = await res.json();
  const sel = $('layoutPartList');
  sel.innerHTML = '';
  (data.layout_parts || []).forEach(l => {
    const o = document.createElement('option');
    o.value = l.index;
    o.textContent = `${l.index}. ${l.name}`;
    sel.appendChild(o);
  });
  hasLaidOut = data.has_laid_out;
}

async function refreshEditPreview() {
  const res = await fetch('/api/edit/preview');
  if (!res.ok) return;
  const blob = await res.blob();
  editImg.onload = () => {
    editCanvas.width = editImg.width;
    editCanvas.height = editImg.height;
    redrawEdit();
  };
  editImg.src = URL.createObjectURL(blob);
}

function redrawEdit() {
  editCtx.clearRect(0, 0, editCanvas.width, editCanvas.height);
  editCtx.drawImage(editImg, 0, 0);
  editCtx.strokeStyle = borderColorHex;
  editCtx.lineWidth = 2;
  wandContours.forEach(c => {
    if (c.length < 2) return;
    editCtx.beginPath();
    c.forEach((p, i) => i ? editCtx.lineTo(p[0], p[1]) : editCtx.moveTo(p[0], p[1]));
    editCtx.closePath();
    editCtx.stroke();
  });
}

function showLayoutPreview(b64) {
  if (!b64) return;
  const img = new Image();
  img.onload = () => {
    layoutCanvas.width = img.width;
    layoutCanvas.height = img.height;
    layoutCtx.clearRect(0, 0, img.width, img.height);
    layoutCtx.drawImage(img, 0, 0);
    $('layoutHint').textContent = '排版预览';
  };
  img.src = 'data:image/png;base64,' + b64;
}

async function importFile(file) {
  const fd = new FormData();
  fd.append('file', file);
  setStatus('导入中…', 'info');
  const res = await fetch('/api/edit/import', { method:'POST', body:fd });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail || '导入失败', 'err');
  wandContours = [];
  $('dropZone').textContent = '已导入: ' + file.name;
  await refreshEditLayers();
  await refreshEditPreview();
  await refreshLayoutParts();
  layoutCtx.clearRect(0, 0, layoutCanvas.width, layoutCanvas.height);
  $('layoutHint').textContent = '点击「自动换行与排版」后在此显示预览';
  setStatus('已导入，点击图画布进行魔棒选区', 'ok');
}

$('dropZone').onclick = () => $('fileInput').click();
$('fileInput').onchange = e => e.target.files[0] && importFile(e.target.files[0]);
$('dropZone').ondragover = e => e.preventDefault();
$('dropZone').ondrop = e => { e.preventDefault(); importFile(e.dataTransfer.files[0]); };

editCanvas.addEventListener('click', async ev => {
  const rect = editCanvas.getBoundingClientRect();
  const x = (ev.clientX - rect.left) * (editCanvas.width / rect.width);
  const y = (ev.clientY - rect.top) * (editCanvas.height / rect.height);
  const res = await fetch('/api/edit/wand', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({x,y}) });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail || '选区失败', 'err');
  wandContours = data.contours || [];
  if (data.border_color_hex) borderColorHex = data.border_color_hex;
  else if (data.border_color) borderColorHex = rgbToHex(data.border_color);
  $('borderColor').value = borderColorHex;
  redrawEdit();
  setStatus(`选区约 ${data.selected_pixels} 像素`, 'ok');
});

$('borderColor').addEventListener('input', async () => {
  borderColorHex = $('borderColor').value;
  const res = await fetch('/api/edit/border-color', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ hex: borderColorHex })
  });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail || '颜色设置失败', 'err');
  if (data.border_color_hex) borderColorHex = data.border_color_hex;
  redrawEdit();
});

$('btnMake').onclick = async () => {
  const res = await fetch('/api/edit/make-layer', { method:'POST' });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail, 'err');
  wandContours = [];
  await refreshEditLayers();
  await refreshEditPreview();
  await refreshLayoutParts();
  setStatus(`已生成 ${data.name}`, 'ok');
};

$('btnMerge').onclick = async () => {
  const res = await fetch('/api/edit/merge', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({indices: editSelected()}) });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail, 'err');
  wandContours = [];
  await refreshEditLayers(); await refreshEditPreview(); await refreshLayoutParts();
  setStatus(`已合并为 ${data.name}`, 'ok');
};

$('btnAutoLayout').onclick = async () => {
  setStatus('排版中…', 'info');
  const res = await fetch('/api/layout/auto', { method:'POST' });
  const data = await res.json();
  if (!res.ok) return setStatus(data.detail, 'err');
  showLayoutPreview(data.preview_png_base64);
  await refreshLayoutParts();
  setStatus(data.message, 'ok');
};

async function updateLayout(params) {
  const res = await fetch('/api/layout/update', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ ...params, selected_positions: layoutSelected() })
  });
  const data = await res.json();
  if (data.spacing_label) $('spacingLabel').firstChild.textContent = data.spacing_label.split(':')[0] + ': ';
  if (data.spacing_label) $('spacingVal').textContent = (data.spacing_px ?? $('spacingSlider').value) + ' px';
  if (data.preview_png_base64) showLayoutPreview(data.preview_png_base64);
  if (data.message) setStatus(data.message, data.has_laid_out ? 'ok' : 'info');
}

bindRange('scaleSlider', 'scaleVal', v => v + '%', () => updateLayout({ scale_percent: +$('scaleSlider').value }));
bindRange('spacingSlider', 'spacingVal', v => v + ' px', () => updateLayout({ spacing_px: +$('spacingSlider').value }));

$('layoutPartList').addEventListener('change', async () => {
  const sel = layoutSelected();
  if (sel.length === 2 && sel[1] === sel[0] + 1) {
    $('spacingLabel').firstChild.textContent = '两部件间距: ';
    setStatus('已选中相邻两部件：拖动「动态间距」只改它们之间的间距', 'info');
    if (hasLaidOut) await updateLayout({ spacing_px: +$('spacingSlider').value });
    return;
  }
  if (sel.length === 1) {
    const res = await fetch('/api/layout/preview-part', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ list_pos: sel[0] }) });
    const data = await res.json();
    if (res.ok) {
      showLayoutPreview(data.preview_png_base64);
      setStatus('预览部件：' + data.name, 'ok');
    }
    return;
  }
  if (hasLaidOut) {
    const res = await fetch('/api/layout/preview');
    if (res.ok) {
      const blob = await res.blob();
      const img = new Image();
      img.onload = () => { layoutCanvas.width=img.width; layoutCanvas.height=img.height; layoutCtx.drawImage(img,0,0); };
      img.src = URL.createObjectURL(blob);
    }
  }
});

$('btnExportPdf').onclick = async () => {
  setStatus('导出 PDF…', 'info');
  const res = await fetch('/api/layout/export-pdf', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ margin_mm: 15, part_expand_mm: 3 })
  });
  if (!res.ok) {
    const err = await res.json();
    return setStatus(err.detail || '请先完成排版', 'err');
  }
  const blob = await res.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'layout_1to1.pdf';
  a.click();
  setStatus('PDF 已导出（部件外扩 3mm）', 'ok');
};

(async () => {
  const res = await fetch('/api/state');
  if (res.ok) await syncBorderColorFromState(await res.json());
})();
</script>
</body>
</html>
